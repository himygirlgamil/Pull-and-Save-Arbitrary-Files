name: x86-64 Download Arbitrary Projects

on:
  workflow_dispatch:
    inputs:
      download_mode:
        description: '选择下载模式：git (下载仓库源码) 或 url (下载直接链接文件)'
        required: true
        default: 'url'
        type: choice
        options:
          - git
          - url
      
      sources:
        description: '请输入源列表 (多个用英文逗号分开)。Git 模式填：仓库 URL#分支/Tag; URL 模式填：文件链接'
        required: true
        default: 'https://github.com/alpinelinux/docker-alpine.git#master,https://github.com/busybox-mirror/busybox.git#stable'
      
      artifact_name:
        description: '请填写制品包名称 (如果留空，多文件时将自动使用默认名)'
        required: false
        default: 'downloaded-artifacts'

jobs:
  download_and_package:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up disk space (Optional)
      run: |
          df -h
          if command -v docker &> /dev/null; then
            docker system prune -a -f || true
            docker volume prune -f || true
          fi

    - name: Download Sources
      run: |
        mode="${{ github.event.inputs.download_mode }}"
        sources="${{ github.event.inputs.sources }}"
        
        mkdir -p download_results
        cd download_results

        IFS=',' read -r -a source_array <<< "$sources"
        
        for source in "${source_array[@]}"; do
          source=$(echo "$source" | xargs)
          
          if [ "$mode" == "git" ]; then
            if [[ "$source" == *"#"* ]]; then
              repo_url="${source%#*}"
              branch="${source##*#}"
            else
              repo_url="$source"
              branch="main"
            fi
            
            repo_name=$(basename "$repo_url" .git)
            echo "Cloning $repo_url (branch: $branch) into $repo_name..."
            git clone --depth 1 --branch "$branch" "$repo_url" "$repo_name"
            
            # 【关键修改】对每个仓库单独打包压缩，模仿 Docker 脚本的行为
            echo "Packing $repo_name..."
            tar -cvf "${repo_name}.tar" -C "$repo_name" .
            xz -v -T0 -8 "${repo_name}.tar"
            rm -rf "$repo_name" # 删除原目录，只保留压缩包
            
          elif [ "$mode" == "url" ]; then
            file_name=$(basename "$source" | cut -d'?' -f1)
            if [ -z "$file_name" ] || [ "$file_name" == "download" ]; then
              file_name="file_$(date +%s)_${RANDOM}"
            fi
            
            echo "Downloading $source to $file_name..."
            curl -L -o "$file_name" "$source"
            
            # 【关键修改】如果是 URL 下载的文件，也可以选择压缩（可选，这里为了统一格式进行压缩）
            # 如果文件已经是压缩包 (xz, gz, zip)，可以跳过压缩，这里为了演示统一处理
            if [[ ! "$file_name" =~ \.(tar\.xz|tgz|zip|gz)$ ]]; then
                echo "Compressing $file_name..."
                tar -cvf "${file_name}.tar" "$file_name"
                xz -v -T0 -8 "${file_name}.tar"
                rm -f "$file_name"
            fi
          else
            echo "Unknown mode: $mode"
            exit 1
          fi
        done
        
        cd ..
        echo "Download and packaging complete. Files:"
        ls -lh download_results/

    - name: Upload artifact
      uses: actions/upload-artifact@v4 
      with:
        # 如果用户没改名字，且只有一个文件，其实可以动态改，但这里保持简单
        # 如果用户希望名字更具体，可以在 inputs 里改，或者这里用脚本动态设置 output
        name: ${{ github.event.inputs.artifact_name != '' && github.event.inputs.artifact_name || 'downloaded-sources' }}
        # 【关键修改】上传目录下所有的 tar.xz 文件，它们会作为独立文件显示在 Artifact 列表中
        path: download_results/*.tar.xz
        retention-days: 5
